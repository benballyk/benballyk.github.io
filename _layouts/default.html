<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-GB' | escape }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#002147">
  <link rel="icon" type="image/svg+xml" href="/assets/img/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css">
  {% feed_meta %}
  {% seo %}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <nav class="sidebar" aria-label="Primary">
    <div class="sidebar-links">
      <a href="/#research">Research</a>
      <a href="/#publications">Publications</a>
      <a href="/#updates">Updates</a>
      <a href="/talks/">Slides</a>
    </div>
  </nav>

  <div class="page">
    <main id="main">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>&copy; {{ "now" | date: "%Y" }} Benjamin Ballyk &middot; Contact: <a href="mailto:benjamin.ballyk@eng.ox.ac.uk">benjamin.ballyk@eng.ox.ac.uk</a></p>
      </div>
    </footer>
  </div>

  <script>
    (function () {
      var links = Array.prototype.slice.call(document.querySelectorAll('.sidebar-links a'));
      if (!links.length) return;

      function activate(link) {
        links.forEach(function (l) {
          var isActive = l === link;
          l.classList.toggle('is-active', isActive);
          if (isActive) {
            l.setAttribute('aria-current', 'true');
          } else {
            l.removeAttribute('aria-current');
          }
        });
      }

      function deactivate(link) {
        link.classList.remove('is-active');
        link.removeAttribute('aria-current');
      }

      var hashLinks = [];
      links.forEach(function (link) {
        var url = new URL(link.href);
        if (!url.hash && url.pathname === location.pathname) {
          activate(link);
        } else if (url.hash && url.pathname === '/') {
          var section = document.getElementById(url.hash.slice(1));
          if (section) hashLinks.push({ link: link, section: section });
        }
      });

      if (!hashLinks.length || !('IntersectionObserver' in window)) return;

      var observer = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          var match = hashLinks.find(function (h) { return h.section === entry.target; });
          if (!match) return;
          if (entry.isIntersecting) {
            activate(match.link);
          } else {
            deactivate(match.link);
          }
        });
      }, { rootMargin: '-45% 0px -50% 0px', threshold: 0 });

      hashLinks.forEach(function (h) { observer.observe(h.section); });
    })();
  </script>
</body>
</html>
