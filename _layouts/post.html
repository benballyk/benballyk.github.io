---
layout: default
---
<div class="container">
  <article class="post">
    <p class="post-back"><a href="/blog/">&larr; Back to blog</a></p>
    <h1>{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%B %-d, %Y" }}</p>
    <div class="post-content">
      {{ content }}
    </div>
  </article>
</div>
