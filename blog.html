---
layout: default
title: Blog
permalink: /blog/
description: "Posts by Benjamin Ballyk."
---
<div class="container">
  <section class="blog-index">
    <h1>Blog</h1>
    {% if site.posts.size > 0 %}
    <ul class="post-list">
      {% for post in site.posts %}
      <li>
        <span class="post-date">{{ post.date | date: "%b %Y" }}</span>
        <a href="{{ post.url }}">{{ post.title }}</a>
      </li>
      {% endfor %}
    </ul>
    {% else %}
    <p class="muted">Nothing here yet &mdash; check back soon.</p>
    {% endif %}
  </section>
</div>
